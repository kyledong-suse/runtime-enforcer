apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: opensuse-replicaset
  namespace: default
  labels:
    app: opensuse-replicaset
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensuse
      type: replicaset
  template:
    metadata:
      labels:
        app: opensuse
        type: replicaset
    spec:
      terminationGracePeriodSeconds: 1
      containers:
      - name: opensuse
        image: registry.opensuse.org/opensuse/bci/bci-ci:3
        command: ["bash", "-c", "while true; do sleep 5; ls; done"]
