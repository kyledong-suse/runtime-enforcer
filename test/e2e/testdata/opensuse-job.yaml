apiVersion: batch/v1
kind: Job
metadata:
  name: opensuse-job
  namespace: default
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 1
      containers:
      - name: opensuse
        image: registry.opensuse.org/opensuse/bci/bci-ci:3
        command: ["bash", "-c", "while true; do sleep 5; ls; done"]
      restartPolicy: OnFailure
